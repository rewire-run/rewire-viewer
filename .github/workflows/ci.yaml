name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: rewire-viewer
      - uses: actions/checkout@v6
        with:
          repository: rewire-run/rewire-extras
          path: rewire-extras
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check
        working-directory: rewire-viewer

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: rewire-viewer
      - uses: actions/checkout@v6
        with:
          repository: rewire-run/rewire-extras
          path: rewire-extras
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rewire-viewer
      - run: cargo clippy --all-features --all-targets -- -D warnings
        working-directory: rewire-viewer

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: rewire-viewer
      - uses: actions/checkout@v6
        with:
          repository: rewire-run/rewire-extras
          path: rewire-extras
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rewire-viewer
      - run: cargo test --all-features
        working-directory: rewire-viewer
